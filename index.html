const { useState, useRef, useEffect, useCallback } = React;

// ============================================
// STUDENT DATA PERSISTENCE (שמירת מצב תלמיד)
// ============================================
// Each student gets a unique profile keyed by name.
// All progress, mistakes, study plans, and settings are saved per-student.

const STORAGE_KEY = "bagrutai_data";

function loadAllData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { students: {}, lastStudent: null };
  } catch (e) {
    return { students: {}, lastStudent: null };
  }
}

function saveAllData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    // localStorage unavailable — data stays in memory only
  }
}

function loadStudentData(studentName) {
  const all = loadAllData();
  return all.students[studentName] || createEmptyStudent(studentName);
}

function saveStudentData(studentName, studentData) {
  const all = loadAllData();
  all.students[studentName] = { ...studentData, lastSaved: new Date().toISOString() };
  all.lastStudent = studentName;
  saveAllData(all);
}

function createEmptyStudent(name) {
  return {
    name,
    createdAt: new Date().toISOString(),
    lastSaved: new Date().toISOString(),
    mode: "regular",
    // Per-subject progress: { [subjectId]: { mistakes: [], practiceResults: [], unitsVisited: [], studyPlan: {...}, flashcardsKnown: [], examSimsDone: 0 } }
    subjectProgress: {},
    // Global stats
    totalPracticeQuestions: 0,
    totalCorrect: 0,
    streakDays: 0,
    lastActiveDate: null,
  };
}

function getSubjectProgress(studentData, subjectId) {
  return studentData.subjectProgress[subjectId] || {
    mistakes: [],
    practiceResults: [],
    unitsVisited: [],
    studyPlan: null,
    flashcardsKnown: [],
    examSimsDone: 0,
    lastPracticeDate: null,
  };
}

// Custom hook: manages student state with auto-save
function useStudentState(studentName) {
  const [data, setData] = useState(() => studentName ? loadStudentData(studentName) : null);

  // Auto-save on every change
  useEffect(() => {
    if (data && studentName) {
      saveStudentData(studentName, data);
    }
  }, [data, studentName]);

  const addMistake = useCallback((subjectId, result) => {
    setData(prev => {
      if (!prev) return prev;
      const sp = getSubjectProgress(prev, subjectId);
      const newResult = { ...result, timestamp: new Date().toISOString() };
      return {
        ...prev,
        subjectProgress: {
          ...prev.subjectProgress,
          [subjectId]: {
            ...sp,
            practiceResults: [...sp.practiceResults, newResult],
            mistakes: result.correct ? sp.mistakes : [...sp.mistakes, newResult],
            lastPracticeDate: new Date().toISOString(),
          },
        },
        totalPracticeQuestions: prev.totalPracticeQuestions + 1,
        totalCorrect: prev.totalCorrect + (result.correct ? 1 : 0),
        lastActiveDate: new Date().toISOString(),
      };
    });
  }, []);

  const markUnitVisited = useCallback((subjectId, unitId) => {
    setData(prev => {
      if (!prev) return prev;
      const sp = getSubjectProgress(prev, subjectId);
      if (sp.unitsVisited.includes(unitId)) return prev;
      return {
        ...prev,
        subjectProgress: {
          ...prev.subjectProgress,
          [subjectId]: { ...sp, unitsVisited: [...sp.unitsVisited, unitId] },
        },
        lastActiveDate: new Date().toISOString(),
      };
    });
  }, []);

  const saveStudyPlan = useCallback((subjectId, plan) => {
    setData(prev => {
      if (!prev) return prev;
      const sp = getSubjectProgress(prev, subjectId);
      return {
        ...prev,
        subjectProgress: {
          ...prev.subjectProgress,
          [subjectId]: { ...sp, studyPlan: plan },
        },
      };
    });
  }, []);

  const addFlashcardKnown = useCallback((subjectId, cardKey) => {
    setData(prev => {
      if (!prev) return prev;
      const sp = getSubjectProgress(prev, subjectId);
      if (sp.flashcardsKnown.includes(cardKey)) return prev;
      return {
        ...prev,
        subjectProgress: {
          ...prev.subjectProgress,
          [subjectId]: { ...sp, flashcardsKnown: [...sp.flashcardsKnown, cardKey] },
        },
      };
    });
  }, []);

  const incrementExamSim = useCallback((subjectId) => {
    setData(prev => {
      if (!prev) return prev;
      const sp = getSubjectProgress(prev, subjectId);
      return {
        ...prev,
        subjectProgress: {
          ...prev.subjectProgress,
          [subjectId]: { ...sp, examSimsDone: sp.examSimsDone + 1 },
        },
      };
    });
  }, []);

  const setMode = useCallback((newMode) => {
    setData(prev => prev ? { ...prev, mode: newMode } : prev);
  }, []);

  const updateStreak = useCallback(() => {
    setData(prev => {
      if (!prev) return prev;
      const today = new Date().toDateString();
      if (prev.lastActiveDate && new Date(prev.lastActiveDate).toDateString() === today) return prev;
      const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
      const wasYesterday = prev.lastActiveDate && new Date(prev.lastActiveDate).toDateString() === yesterday.toDateString();
      return {
        ...prev,
        streakDays: wasYesterday ? prev.streakDays + 1 : 1,
        lastActiveDate: new Date().toISOString(),
      };
    });
  }, []);

  return { data, setData, addMistake, markUnitVisited, saveStudyPlan, addFlashcardKnown, incrementExamSim, setMode, updateStreak };
}

  "3": {

        content: "פסוקיות לוואי, הידועות גם כפסוקיות משניות או תלויות, הן פסוקיות שלא יכולות להעמוד בכוחן ותמיד תלויות בפסוקית ראשית. בעברית, יש ארבעה סוגים עיקריים של פסוקיות לוואי, כל אחת בעלת תפקיד ומאפיינים שונים.\n\nפסוקיות לוואי משמשות מטרות שונות בתוך המשפט: כמשלימות (completion), כתארות (modification), כנושאות (subject), וכמיודות (adverbial). הבנת סוגים אלה חיונית לניתוח וכתיבה של משפטים מורכבים.\n\nלפי תפקידן בתוך המשפט, פסוקיות לוואי יכולות להיות: נושא (subject clause), משלים (complement clause), תואר (adjectival clause), או מיודה (adverbial clause).\n\nמיקום הפסוקית הלוואית במשפט יכול להשתנות בהתאם לסוגה ולתפקידה. כמה פסוקיות לוואיות יכולות להופיע בתחילת המשפט, בעוד אחרות מופיעות בסוף או באמצע."

  "8": {

      {
        title: "סימני הפסוק ותפקידיהם הבסיסיים",
        content: "סימני פיסוק הם סימנים בכתב שעוזרים להבין את המשמעות של טקסט ולקרוא אותו בצורה נכונה. כל סימן פיסוק יש תפקיד ספציפי בהבהרת הכוונה של הכותב.\n\nהנקודה (.) משמשת לסיום משפט שלם, שיוצר הפסקה מלאה בקריאה. הפסיק (,) משמש לחלוקת משפט למספר חלקים, המאפשרים קריאה בקצב אט יותר ובהירה יותר. נקודתיים (:) משמשים להציג רשימה או הסבר הבא. נקודה-פסיק (;) משמשת לחיבור בין שני משפטים חלופיים או להפרדה בין פריטים מורכבים ברשימה.\n\nהמקף (-) משמש לחיבור מילים או להפרדה של כותרות משנה. סוגריים ( ) משמשים להוספת מידע נוסף או הסבר בתוך משפט. גרשיים (\") משמשים לציטוט ישיר של דברים שאמר מישהו או כדי להדגיש מילה.\n\nשימוש נכון בסימני פיסוק משפיע ישירות על הבהרת המסר ועל קלות הקריאה. בחינות בגרות, שימוש לקוי בסימני פיסוק יכול להוביל להפסד נקודות בסגנון וקריאות."

  "9": {

        content: "דמויות לשון (דמויות דיבור) הן טכניקות הכתיבה המשמשות ליצור דימויים, הרגשות, ותמונות מנטליות בקורא. הן לא תיאורים ישירים של דבר, אלא דרכים עקיפות ויצירתיות לעבר משהו.\n\nדמויות לשון משמשות בספרות, בשירה, בפרסום, ובתקשורת. הן עוזרות למחבר להביע רגשות בעומק, ליצור קשר עם הקוראים, ולהפוך משפט יבש לתיאור חי ומעניין. בחינות בגרות, הבנה וזיהוי של דמויות לשון היא מיומנות קריטית.\n\nהדמויות העיקריות בעברית הן: דימוי (simile), מטאפורה (metaphor), האנשה (personification), סינקדוכה (synecdoche), מטונימיה (metonymy), הגזמה (hyperbole), והפחתה (litotes). כל אחת מהן משמשת מטרה ספציפית בהבעת מחשבות ורגשות.\n\nדמויות לשון לא רק יושבות בטקסט - הן מנייצות את ההשלכה הרגשית של המילים. מחברים טובים משתמשים בהן בצורה מושכלת כדי לעמקו את החוויה של הקורא."

  "11": {

      {
        title: "סמנטיקה: משמעות המילה",
        content: "סמנטיקה היא ענף של הלשון החוקר את משמעויות המילים. כל מילה בעברית (וכל שפה) יש משמעות (meaning). משמעות זו יכולה להיות מרובה, הולכת בעומק, או משתנה בהתאם להקשר.\n\nישנם שני סוגים עיקריים של משמעות: ציוני (denotation) וחוש (connotation). ציוני היא המשמעות הדיווקית, הפשוטה - מה המילה באמת מתכוונת. חוש היא המשמעות העקיפה, רגשית - מה המילה גורמת לנו להרגיש או חושבים עליה.\n\nדוגמה: המילה 'כלב' בציוני = חיה בעלת ארבע רגליים שמנבחת. בחוש = מנהל, חברות, נאמנות. אחרת, המילה 'חתול' בציוני = חיה בעלת ארבע רגליים שמיאו. בחוש = עצמאות, כיתול, רעם.\n\nהבנת סמנטיקה חיוני להבנה של טקסט בעומק ולהערכת הבחירות המילוליות של המחבר. בחינות בגרות, שאלות עוסקות בעתקדות סמנטיות וקשר בין משמעויות."
      },

    "13": {
    learn: [
      { title: "פעולות דיבור - Speech Acts", content: "פעולות דיבור הן פעולות שאנו מבצעים דרך השפה. כל משפט שאנו מבטאים הוא לא רק דברים שנוכל לחשב אם הם נכונים או לא, אלא גם פעולה חברתית שיש לה השפעה על האחר. מערכת כללית של חוקרים בראשות ג'ון סרל (John Searle) חילקה את פעולות הדיבור לקטגוריות שונות: ביטויים מידעים (constatives) שניתן להערכם כנכונים או שקריים, כגון \"השמש זורחת\"; ופעולות ביצוע (performatives) שלא ניתן להערכן כנכונים או שקריים, כגון \"אני מתנצל\" או \"אני מוחה על זה\".\n\nהפעולה המתבצעת בדברים חמוקה לעיתים מעין השטח של המשפט עצמו. כאשר אתה אומר \"האם יכול אתה לסגור את החלון?\", אתה למעשה מבקש מהאדם לסגור את החלון, למרות שהמשפט מנוסח כשאלה. זו נקראת \"פעולה דיבור עקיפה\" (indirect speech act). הבנת הפעולה בפועל מחייבת הכרה בעקיפות זו וביכולתנו לקרוא בין השורות של תקשורת אנושית.\n\nפעולות דיבור חשובות מאוד בניתוח טקסטים, מכיוון שהן עוזרות לנו להבין את הכוונה האמיתית של הדובר או הכותב. כאשר אנו קוראים יצירה ספרותית, אנו צריכים להיות מודעים לכך שהדמויות לא רק אומרות דברים - הן משתמשות בדברים כדי להשיג מטרות קונקרטיות, כמו הרתעה, שכנוע, או יצירת אנטימות." },
      { title: "Implicature - משתמע הדברים", content: "המושג \"משתמע\" נטבע על ידי פילוסוף בשם פול גרייס (Paul Grice). משתמע הוא משהו שלא נאמר בצורה מפורשת, אך אנו מסיקים אותו מההקשר ומכללי התקשורת. לדוגמה, אם מישהו שואל אותך \"האם קראת את הספר הזה?\" ואתה עונה \"יש לי הרבה עבודה בתוכנית שלי\", אתה לא ענית ישירות על השאלה, אך אתה משתמע שלא קראת את הספר.\n\nגרייס הגדיר כללים למה הוא קרא \"הרעיון הקואופרטיבי\" של התקשורת. על פי קרייס, יש ארבע משימות בחשיבה: כמות (אנחנו מספקים מספיק מידע, אך לא יותר מדי), איכות (אנחנו מנסים להיות כנים ולתמוך בטענותינו), קשר (אנחנו אומרים דברים רלוונטיים), וצורה (אנחנו מנסים להיות ברורים). כאשר משהו סותר את אחד מהכללים הללו, אנו מפתחים משתמע.\n\nהמשתמע משחק תפקיד גדול בתרבות וביצירות ספרותיות. במקום לומר דברים בצורה ישירה, אנשים משתמשים בהנחות סמויות ובמשתמע כדי לתקשר בדרכים עדינות יותר ולעתים אומנותיות. הבנת המשתמע היא חיונית להבנה עמוקה של טקסטים ושיחות." },
      { title: "הקשר - Context", content: "הקשר הוא כל המידע שמסביב למשפט או הטקסט שמשפיע על משמעותו. הוא כולל את המצב הפיזי (איפה מדברים), המשתתפים (מי דובר למי), הזמן (מתי), התולדות (מה קרה קודם), והידע המשותף של המשתתפים. משפט אחד יכול להיות בעל משמעויות שונות לחלוטין בהקשרים שונים.\n\nלדוגמה, המשפט \"עכשיו זה טוב\" יכול להיות תגובה חיובית, ביטוי of frustration, או אפילו אירוניה, תלוי בהקשר. אם מישהו תיקן דברים שהיו לא טובים קודם לכן, המשפט הוא תגובה חיובית. אם מישהו עשה משהו שהיה צפוי או מרוצה, אולי זה בעיה של frustration.\n\nבניתוח טקסטים, צריך לשקול את ההקשר האלמודי (מה שנאמר עדיין בטקסט) וגם את ההקשר החיצוני (מה שצריך לדעת מעבר לטקסט, כמו מי כתב אותו, מתי, ולאיזה תרבות). הקשר זה משפיע על הפרשנות של כל חלק של הטקסט." },
      { title: "גרייס מקסימס והנימוסיות - Politeness", content: "מקסימות גרייס הם כללים שבני אדם משתמשים בתקשורת כדי להישמר על הקואופרטיביות של שיחה. כמו שצוין, יש ארבע מקסימות: כמות, איכות, קשר, וצורה. בעת שאנו משברים את אחת מהמקסימות בצורה מודעת ואנחנו רוצים שהאדם השני יבין שאנו משברים אותה, אנו יוצרים משתמע.\n\nנימוסיות היא מערכת של כללים חברתיים שמגנה על ההכבדה של מישהו (face) בתקשורת. יש לנו \"פנים\" חיוביות (הרצון שלנו שאחרים יחשבו טוב עלינו) ו\"פנים\" שליליות (הרצון שלנו לא להיות מוגבלים על ידי אחרים). כאשר אנו מדברים בנימוסיות, אנו מנסים לשמור על שני סוגי הפנים - שלנו ושל האדם השני.\n\nדרכים שונות של אומר דבר אותו דבר יכול להיות בעל מידה שונה של נימוסיות. \"סגור את החלון!\" הוא פחות נימוס מ\"האם היית יכול לסגור את החלון, בבקשה?\" כי זה לא מכיל את הגן על הפנים השליליות של האדר השני (הרצון שלו להיות חופשי מהנעה מאחרים)." }
    ],

  "14": {
    learn: [
      { title: "ההבנה של הרעיון המרכזי", content: "הרעיון המרכזי של טקסט הוא הנושא הכללי או ההודעה העיקרית שהכותב מנסה להעביר. זה שונה מפרטים המסייעים לתמוך בהרעיון הזה. בדרך כלל, הרעיון המרכזי קשור לנושא של הטקסט אבל זה יותר מסתם נושא - זה הרעיון או הטענה שהכותב מפתח לגביו.\n\nכדי למצוא את הרעיון המרכזי, צריך לשאול: מה הדבר החשוב ביותר שהכותב רוצה שנדע? מה השם של הטקסט? אילו נושאים חוזרים על עצמם? מה הנוסחה הכללית שיכולה לתאר את כל הטקסט?\n\nרעיון מרכזי יכול להיות מובהק (כלומר, הכותב אומר זאת בפירוש) או משתמע (כלומר, אנו צריכים להסיק זאת מהפרטים שניתנו). בטקסטים מקצועיים, הרעיון המרכזי לעתים קרובות מופיע בפסקת הפתיחה, בדרך כלל בסוף הפסקה הזו. בטקסטים ספרותיים, הרעיון המרכזי לעתים קרובות משתמע ויש לנו לחלץ אותו." },
      { title: "פרטים תומכים ודרגות השפעה", content: "פרטים תומכים הם מידע ספציפי - עובדות, דוגמות, ציטוטים, סטטיסטיקה, או סיפורים - המשמשים להרחבת ותמיכה בהרעיון המרכזי. פרטים תומכים עוזרים לשכנע את הקורא בנכונות הרעיון המרכזי, ויוצרים תמונה ברורה יותר של מה שהכותב אומר.\n\nפרטים תומכים מסודרים בדרך כלל לפי דרגות השפעה. דרגה ראשית של פרטים תומכים קשורה ישירות לרעיון המרכזי. דרגה שנייה של פרטים תומכים מרחיבה על הפרטים בדרגה ראשית. כדי למצוא את הפרטים התומכים, שאל: אילו עובדות או דוגמות מספק הכותב? כיצד הם תומכים בטענתו? האם יש דוגמות מספציפיות או עובדות סטטיסטיות?\n\nפרטים תומכים טובים הם רלוונטיים לרעיון המרכזי, מספקים מידע חדש, וניתנים לאימות." },
      { title: "הסקה וקריאה בין השורות", content: "הסקה היא תהליך של הגעה למסקנה על בסיס עדויות או רמזים בטקסט, אך לא יכול לומר במפורש. כאשר קוראים טקסט, לעיתים קרובות הכותב מצביע על משהו בלי לומר זאת בעצם. קורא טוב צריך להיות מסוגל לקרוא בין השורות וליצור הסקות על בסיס התוכן.\n\nדוגמה: אם קוראים \"הוא לא חזר הביתה בשתי שנים\", אנו יכולים להסיק שהוא היה במקום אחר כל הזמן הזה. אנו צריכים לקבל מידע מרומז על בסיס מה שנאמר. בנוסף, הסקות טובות מבוססות על עדויות בטקסט - אנו לא מפתחים הסקות מניחוש או מידע שלנו.\n\nהסקה חשובה בעיקר כאשר קוראים טקסטים ספרותיים, בהם המרצים אומרים הרבה פחות מפורש וצריכים להשתמע דברים רבים." },
      { title: "מבנה טקסט וקוהרנטיות", content: "מבנה טקסט הוא הדרך שבה מוקדם הרעיונות בטקסט. טקסט יכול להיות מבנה כרוני (על ידי זמן), מבנה סיבה-תוצאה (איפה רעיון אחד מוביל לעוד), מבנה השוואה-ניגוד (איפה רעיונות מושווים), מבנה ממיון (איפה הרעיונות מחולקים לקטגוריות), או מבנה בעיה-פתרון (איפה בעיה מיוצגת ופתרונות מוצעים).\n\nקוהרנטיות היא משהו שעוזר לקורא להבין כיצד הרעיונות קשורים זה לזה. קוהרנטיות משיגה בדרך כלל דרך מילות מעבר (כמו \"לכן\", \"אך\", \"לדוגמה\"), חזרה של מילים חשובות, הפניות כמו \"זה\" או \"כך\", וסדר הגיוני של רעיונות. טקסט קוהרנטי זורם בצורה טבעית מרעיון לרעיון.\n\nטקסט מובנה היטב וקוהרנטי יהיה הרבה יותר קל לקריאה והבנה מאשר טקסט שבו הרעיונות מופיעים בסדר אקראי ללא קשר ברור." }

  "15": {

      { title: "טענה ותזה - הבסיס של חיבור טיעוני", content: "טענה היא הצהרה שיכול להיות אמת או שקר, והכותב מנסה להוכיח אותה. בחיבור טיעוני, הטענה הראשית נקראת \"תזה\" (thesis statement) והיא בדרך כלל נמצאת בסוף הפסקה הפתיחה. תזה טובה היא ספציפית, ניתנת להוכחה, ודומיננטית - זה הדבר החשוב ביותר שהכותב מנסה להוכיח.\n\nלדוגמה: \"גלובליזציה שינתה את האופן שבו אנו חיים\" היא טענה עדיפה כי היא ספציפית וניתנת להוכחה באמצעות עדויות. לעומת זאת, \"גלובליזציה הוא דבר\" אינה תזה טובה כי היא לא ספציפית או ניתנת להוכחה.\n\nתזה אפילו חשובה יותר בחיבור טיעוני כי היא קובעת את הכיוון של כל הטיעון. זה מספר לקורא בדיוק מה להצפות במהלך הקריאה." },
      { title: "ראיה ונימוק - שלד הטיעון", content: "ראיה היא נתונים קונקרטיים המשמשים להתמכות בטענה - זה יכול להיות עובדה, סטטיסטיקה, דוגמה, או ציטוט מקום אחר. נימוק הוא הסבר לשם מה הראיה תומכת בטענה. לעתים קרובות, כותבים עושים טעות על ידי הצגת ראיה בלי להסביר למה זה חשוב. טיעון טוב כולל ראיה חזקה וגם נימוק ברור.\n\nלדוגמה: ראיה יכולה להיות \"ב-2020, 40% מהאנשים עבדו מהבית\". נימוק יהיה: \"זה מראה שגלובליזציה שינתה את אופן העבודה שלנו\". הראיה ללא נימוק היא חסרה - הקורא לא יהיה בטוח למה זה מועיל בכלל.\n\nראיה טובה היא רלוונטית, מעודכנת, וממקורות אמינים. נימוק טוב הוא ברור, לוגי, וקשור ישירות לטענה." },
      { title: "טענת נגד ותגובה", content: "טענת נגד היא טיעון שמתנגד לטענה שלך. כותב טוב מכיר את הטיעונים נגד דעתו וממשיג בהם בצורה הוגנת לפני שהוא מתנגד להם. זה מראה שהכותב הבין היטב את הנושא וחשב עליו מעמוקות.\n\nכדי להשתמש בטענת נגד בצורה יעילה, תצטרך:\n1. להציג את הטענה הנגדית בצורה הוגנת ותקפה (לא בדרך חלשה או מבדלת)\n2. להסביר למה זה טיעון מתרחש\n3. לתת תגובה חזקה המראה למה הטענה שלך עדיין עדיפה\n\nדוגמה: \"כמה אנשים טוענים שגלובליזציה פגעה בכלכלה המקומית. זה נכון בכמה אזורים. אבל בסה\"כ, הטבעות המסחריות החדשות שנוצרו יותר מכמה בערך את ההפסדים.\"\n\nטענת נגד טוב תוביל לטיעון חזק יותר." },
      { title: "מבנה חיבור טיעוני", content: "חיבור טיעוני בדרך כלל יש שלוש חלקים עיקריים: הקדמה, גוף, וסיום.\n\nבהקדמה, אתה:\n- תופס את תשומת הלב של הקורא\n- מעביר את הנושא\n- מציג את התזה שלך\n\nבגוף, אתה:\n- פתח פסקה אחת לכל נקודה או תת-טענה\n- נתן ראיה ונימוק לכל נקודה\n- משתמש במילות מעבר כדי לקשור רעיונות\n- שקול להשתמש בטענת נגד אם הדבר מתאים\n\nבסיום, אתה:\n- תזכור את התזה שלך בצורה חדשה\n- סיכום את הנקודות העיקריות שלך\n- הערות על משמעות הטיעון שלך או הצעה של פעולה\n\nמבנה זה משמעותי כי הוא עוזר לקורא להכין מה להצפות ולעקוב את הטיעון שלך." }

  "16": {

      { title: "סוגות טקסט ותכניות שלהם", content: "כל טקסט כתוב בסוג מסוים, וכל סוג יש לו מטרה ותכניות שונה. הבנת סוג הטקסט עוזרת לנו להבין את הכוונה של הכותב וכיצד הוא ארגון את הרעיונות שלו.\n\nטקסט ידיעתי (informative) נועד להעביר מידע על נושא. מטרתו היא ללמד את הקורא משהו חדש. דוגמה: מאמר בעיתון על גלובליזציה, מדריך הוראות, או אנציקלופדיה.\n\nטקסט שכנועי (persuasive) נועד לשכנע את הקורא כדי להסכים עם דעה או פעולה. דוגמה: פרסומת, מאמר דעות, או חיבור טיעוני.\n\nטקסט ספרותי (literary) נועד להקנות החוויה או הרגש. מטרתו לא רק להעביר מידע אלא ליצור קשר רגשי עם הקורא. דוגמה: רומן, סיפור קצר, שיר, או מחזה." },
      { title: "טקסט הנחייתי וטקסט משווה", content: "טקסט הנחייתי (instructional) נועד להסביר לקורא איך לעשות משהו או כיצד לפעול. זה מכיל שלבים ברורים, לעתים קרובות מסודרים בסדר זמני. דוגמה: כישור בישול, כישור לשימוש בתוכנה חדשה, או הנחיות בטיחות.\n\nטקסט משווה (comparative) נועד להשוות בין שני דברים או יותר. זה יכול לראות הן דמיון והן הבדלים. דוגמה: השוואה בין שתי מדינות, השוואה בין שתי אופציות של מוצר, או ניתוח של שתי תיאוריות מדעיות.\n\nהבנת סוג הטקסט כוללת לזהות את המטרה, את הדמויות, את הטון, ואת המבנה של הטקסט. כל סוג יש אפילו נוסחת הישכתבה שנפוצה, כמו שמחזה הוא לעתים קרובות בעל דיאלוג רבה או שסיפור קצר בדרך כלל יש עלילה שלמה בעמודים מעטים." },
      { title: "אפיונים ותכניות של סוגות שונות", content: "טקסט ידיעתי בדרך כלל יש מבנה ברור (בדרך כלל הקדמה-גוף-סיום), משתמש בשפה נייטראלית וסטנדרטית, וממשיג כמו שניתן להבין פרטים.\n\nטקסט שכנועי משתמש בשפה רגשית יותר, יכול להשתמש ב rethoric כמו הסתברות או השוואה, ובדרך כלל יש מטרה מוצהרת או משתמעת.\n\nטקסט ספרותי משתמש בשפה עתירה דימויים (imagery), אפילו יכול להשתמש בטכניקות כמו רימה, חזרה, ודימויים משפחתיים (metaphors). זה דורש קריאה בין השורות ויכול לפתוח לפרשנויות מרובות.\n\nטקסט הנחייתי בדרך כלל מעט רשום, משתמש בפקודות (imperatives), וסדר הוא חיוני.\n\nטקסט משווה יכול להשתמש במבנה השוואה-ניגוד, כאשר אתה מדבר על הדמיון בנפרד מן ההבדלים, או \"טוגל\" מבנה, בו אתה משווה נקודה אחת בכל פעם." },
      { title: "זיהוי סוג הטקסט ותכניתו", content: "כדי לזהות את סוג הטקסט, שאל את עצמך:\n- מה הוא מטרת הטקסט? (להעביר מידע, לשכנע, ללמד כיצד לעשות משהו, להשוות, או להקנות חוויה?)\n- מי הוא הכותב וכיצד הוא מדבר? (טון נייטראלי, רגשי, פורמלי, או בלתי פורמלי?)\n- איך הטקסט מארגן את הרעיונות? (בסדר זמני, לוגי, או חיצוני?)\n- אילו טכניקות משתמש הכותב? (דימויים, ראיה, אתוס (ethos), הטפוס (pathos), לוגוס (logos)?)\n\nהבנת סוג הטקסט ותכניתו עוזרת לנו להבין את הכוונה של הכותב ולעריך את יעילות הטקסט בהשגת מטרתו." }

    learn: [
      { title: "עיצורים וטון בהגה עברית", content: "עיצורים הם צלילים שנעשים כאשר אנו חוסמים או מעכבים את זרם האוויר. בעברית, יש לנו 22 עיצורים. כל עיצור ניתן לתאר לפי מקום של ההתחברות (place of articulation) והדרך של ההתחברות (manner of articulation).\n\nמקום של ההתחברות מתאר איפה בחזה הקול יוצר את הצליל. לדוגמה:\n- שפתיים (bilabials): ב, פ, מ\n- שיניים (dentals): ד, ת\n- חיך קשה (alveolars): ל, ר, ן, ס, צ\n- חיך רך (velars): ק, ח\n\nהדרך של ההתחברות מתאר איך אנו פותחים את הלהט. לדוגמה:\n- סטופים (stops): אנו חוסמים את האוויר לחלוטין (ב, פ, ד, ת, ק, ג)\n- מרצים (fricatives): אנו מעכבים את האוויר בלי לחסום אותו לחלוטין (ש, ח, צ, ס)\n- נזליים (nasals): אנו שולחים את האוויר דרך האפיים (מ, נ)\n\nזה משמעותי כי זה עוזר לנו להבין איך אנו יוצרים צלילים ולתקן הגייה או לכתוב בצורה משופרת." },
      { title: "תנועות בעברית וגמישותן", content: "תנועות הן צלילים שנוצרים כאשר אנו מאפשרים לאוויר לזרום בחופשיות דרך הפה. בעברית, יש 5 תנועות עיקריות: א (a), ה (e), י (i), ו (o), ה (u).\n\nתנועות משתנות גם לפי כמה פתוח הפה ואיפה לשון נמצא. לדוגמה:\n- תנועות פתוחות: א (a) - הפה פתוח רחב\n- תנועות חצי-פתוחות: ה (e) - הפה חצי פתוח\n- תנועות סגורות: י (i) - הפה צר וסגור\n\nהבנת מערכת התנועות עוברית חשובה מכיוון שתנועות משנות את משמעות המילה. לדוגמה: בל (without), בל (swear), בול (seal) - הבדל בתנועה משנה משמעות.\n\nבנוסף, יש לנו שוא (schwa) - תנועה קצרה מאוד שנשמעת כמו 'uh' בעברית, המופיע לעתים קרובות בדברים." },
      { title: "קולי וציתום - קטגוריות חשובות של עיצורים", content: "עיצורים משתנים גם לפי האם הם מוצאים קול (voiced) או אם הם אטומים (voiceless). קוליים אומר שהקול שלנו עובד - אתה יכול להרגיש זה על ידי הנחת יד על גרוני שלך.\n\nעיצורים קוליים בעברית: ב, ד, ג, ו, י, ז, ל, מ, נ, ר\nעיצורים אטומים בעברית: פ, ת, ק, ח, ש, צ, ס\n\nלעתים קרובות, בעברית, יש זוגות של עיצורים שהם זהים בחוק אבל שונים בעניין הקול. לדוגמה:\n- ב (voiced) vs פ (voiceless)\n- ד (voiced) vs ת (voiceless)\n- ג (voiced) vs ק (voiceless)\n\nהבנת קוליים vs אטומים חשובה כי זה משפיע על הגייה, על פעמים (stress) ועל איך אנו מבינים מילים שונות בעברית." },
      { title: "יישום של פונטיקה בקריאה וכתיבה", content: "הבנת פונטיקה (הגיה עברית) עוזרת לנו בכמה דרכים:\n\n1. בקריאה: כאשר אנו יודעים איך עיצורים ותנועות עובדים, אנו יכולים לקרוא מילה חדשה ולנחש את ההגייה שלה.\n\n2. בכתיבה: אנו יכולים לתקן הגייה או לעמוד על צליל נכון בעת כתיבה של מילים חדשות או במקרים שבהם הכתיבה היא כעיסה ולא ברורה.\n\n3. בתרגום: כאשר אנו מתרגמים מעברית לשפות אחרות, הבנת פונטיקה עוזרת לנו להבחין בצלילים שיש בעברית אך לא בשפה אחרת.\n\n4. בזיהוי טעויות: כאשר אנו מודעים לכללים של פונטיקה, אנו יכולים להבחין בטעויות הגייה וצליל בטקסטים.\n\nפונטיקה עברית היא כלי משמעותי בידי קוראים וכותבים שרוצים להעמיק את ההבנה שלהם של שפה." }

// Mode Toggle Component
function ModeToggle({ mode, onToggle }) {
  const isFocus = mode === "focus";
  return (
    <div style={{
      display: "flex",
      alignItems: "center",
      gap: "4px",
      background: isFocus ? "rgba(255,255,255,0.08)" : "#f1f5f9",
      borderRadius: "50px",
      padding: "4px",
      border: isFocus ? "1px solid rgba(255,255,255,0.15)" : "1px solid #e2e8f0",
    }}>
      <button
        onClick={() => onToggle("regular")}
        style={{
          padding: "8px 18px",
          borderRadius: "50px",
          border: "none",
          cursor: "pointer",
          fontSize: "14px",
          fontWeight: mode === "regular" ? "700" : "400",
          background: mode === "regular"
            ? (isFocus ? "rgba(255,255,255,0.95)" : "#ffffff")
            : "transparent",
          color: mode === "regular"
            ? "#1e293b"
            : (isFocus ? "rgba(255,255,255,0.5)" : "#94a3b8"),
          transition: "all 0.3s ease",
          display: "flex",
          alignItems: "center",
          gap: "6px",
          boxShadow: mode === "regular" ? "0 2px 8px rgba(0,0,0,0.1)" : "none",
        }}
      >
        <span style={{ fontSize: "16px" }}>🌈</span> מצב רגיל
      </button>
      <button
        onClick={() => onToggle("focus")}
        style={{
          padding: "8px 18px",
          borderRadius: "50px",
          border: "none",
          cursor: "pointer",
          fontSize: "14px",
          fontWeight: mode === "focus" ? "700" : "400",
          background: mode === "focus"
            ? (isFocus ? "rgba(255,255,255,0.95)" : "#1e293b")
            : "transparent",
          color: mode === "focus"
            ? (isFocus ? "#1e293b" : "#ffffff")
            : (isFocus ? "rgba(255,255,255,0.5)" : "#94a3b8"),
          transition: "all 0.3s ease",
          display: "flex",
          alignItems: "center",
          gap: "6px",
          boxShadow: mode === "focus" ? "0 2px 8px rgba(0,0,0,0.15)" : "none",
        }}
      >
        <span style={{ fontSize: "16px" }}>🎯</span> קשב וריכוז
      </button>
    </div>
  );
}

// Subject Card
function SubjectCard({ subject, onClick, mode }) {
  const [hovered, setHovered] = useState(false);
  const unitCount = subject.units.length;
  const isFocus = mode === "focus";

  return (
    <button
      onClick={onClick}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        background: isFocus
          ? hovered ? "#2d3748" : "#1a202c"
          : hovered ? `${subject.color}22` : "rgba(255,255,255,0.95)",
        border: isFocus
          ? `2px solid ${hovered ? subject.color : "#4a5568"}`
          : `2px solid ${hovered ? subject.color : "#e2e8f0"}`,
        borderRadius: "20px",
        padding: "28px 24px",
        cursor: "pointer",
        transition: "all 0.3s ease",
        transform: hovered ? "translateY(-4px)" : "translateY(0)",
        boxShadow: hovered
          ? `0 12px 40px ${subject.color}30`
          : "0 4px 20px rgba(0,0,0,0.08)",
        textAlign: "center",
        minWidth: "160px",
        position: "relative",
        overflow: "hidden",
      }}
    >
      <div style={{ fontSize: "48px", marginBottom: "12px" }}>{subject.icon}</div>
      <div style={{
        fontSize: "20px",
        fontWeight: "700",
        color: isFocus ? "#e2e8f0" : "#1e293b",
        marginBottom: "6px",
      }}>
        {subject.name}
      </div>
      <div style={{
        fontSize: "13px",
        color: isFocus ? "#a0aec0" : "#94a3b8",
        marginBottom: "8px",
      }}>
        שאלון {subject.examNumber}
      </div>
      <div style={{
        display: "inline-block",
        background: `${subject.color}20`,
        color: subject.color,
        padding: "4px 14px",
        borderRadius: "20px",
        fontSize: "13px",
        fontWeight: "600",
      }}>
        {unitCount} יחידות

// AI Tutor Chat
function AITutor({ unit, subject, mode, isOpen, onToggle }) {
  const [messages, setMessages] = useState([
    { role: "ai", text: `שלום! אני המורה הפרטי שלך ב${subject.name} 🎓\nנושא: ${unit.title}\n\nשאל/י אותי כל שאלה על החומר ואני אעזור לך להבין!` },
  ]);
  const [input, setInput] = useState("");
  const [isTyping, setIsTyping] = useState(false);
  const messagesEndRef = useRef(null);
  const isFocus = mode === "focus";

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages]);

  const generateResponse = (question) => {
    const q = question.toLowerCase();
    const topicResponses = unit.topics.map((t) => {
      if (q.includes(t.toLowerCase?.() || t)) {
        return `לגבי "${t}" — זה נושא חשוב מאוד בבגרות.\n\n${unit.summary}\n\nנקודות מפתח שצריך לזכור:\n• הנושא מופיע ב${unit.examUnit}\n• כדאי לתרגל שאלות על ${unit.topics.slice(0, 3).join(", ")}`;
      }
      return null;
    }).filter(Boolean);

    if (topicResponses.length > 0) return topicResponses[0];

    if (q.includes("מה") || q.includes("הסבר") || q.includes("תסביר")) {
      return `בוא/י נפרק את "${unit.title}" לחלקים:\n\n${unit.summary}\n\n💡 טיפ לבגרות: תתרגל/י לענות על שאלות שמשלבות כמה נושאים — ${unit.topics.slice(0, 2).join(" ו-")} — כי כך הן מופיעות בשאלון.`;
    }

    if (q.includes("דוגמ") || q.includes("תרגיל") || q.includes("תרגול")) {
      return `בוא/י נתרגל! 📝\n\nשאלת תרגול:\n"הסבר/י את הקשר בין ${unit.topics[0]} ל${unit.topics[1]}. הבא/י דוגמה."\n\nנסה/י לענות, ואני אבדוק את התשובה שלך!`;
    }

    if (q.includes("חשוב") || q.includes("עיקר") || q.includes("סיכום")) {
      return `📌 סיכום הנקודות החשובות ב"${unit.title}":\n\n${unit.summary}\n\nנושאי מפתח: ${unit.topics.join(" | ")}\n\n⚡ זה מופיע ב${unit.examUnit} — חשוב מאוד לדעת את זה!`;
    }

    const mnem = CORRECTIVE_TEACHING.generateMnemonic(unit.topics[0], unit.topics);
    const mnemTip = mnem ? `\n\n🧠 עזר זיכרון:\n${mnem.phrase}\n🎨 דמיין: ${mnem.visual}` : "";
    return `שאלה מעולה! 🌟 בוא/י נלמד צעד אחר צעד.\n\n🪜 ${unit.title} — בקצרה:\n${unit.summary}\n\n📌 נושאים שחובה לדעת:\n${unit.topics.map((t, i) => `${i + 1}. ${t}`).join("\n")}${mnemTip}\n\n💭 רוצה שאסביר נושא ספציפי? שאל/י ואני אפרק לשלבים!`;
  };

  const handleSend = () => {
    if (!input.trim()) return;
    const userMsg = input.trim();
    setMessages((prev) => [...prev, { role: "user", text: userMsg }]);
    setInput("");
    setIsTyping(true);

    setTimeout(() => {
      const response = generateResponse(userMsg);
      setMessages((prev) => [...prev, { role: "ai", text: response }]);
      setIsTyping(false);
    }, 1000 + Math.random() * 1000);
  };

  if (!isOpen) {
    return (
      <button
        onClick={onToggle}
        style={{
          position: "fixed",
          bottom: "24px",
          left: "24px",
          width: "60px",
          height: "60px",
          borderRadius: "50%",
          background: `linear-gradient(135deg, ${subject.color}, ${subject.color}dd)`,
          color: "white",
          border: "none",
          cursor: "pointer",
          fontSize: "28px",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          boxShadow: `0 8px 30px ${subject.color}50`,
          transition: "all 0.3s ease",
          zIndex: 1000,
        }}
      >
        🤖
      </button>
    );
  }

  return (
    <div style={{
      position: "fixed",
      bottom: "24px",
      left: "24px",
      width: "380px",
      height: "520px",
      borderRadius: "24px",
      background: isFocus ? "#1a202c" : "white",
      border: isFocus ? "1px solid #4a5568" : "1px solid #e2e8f0",
      boxShadow: "0 20px 60px rgba(0,0,0,0.2)",
      display: "flex",
      flexDirection: "column",
      overflow: "hidden",
      zIndex: 1000,
      direction: "rtl",
    }}>
      {/* Header */}
      <div style={{
        padding: "16px 20px",
        background: `linear-gradient(135deg, ${subject.color}, ${subject.color}cc)`,
        color: "white",
        display: "flex",
        justifyContent: "space-between",
        alignItems: "center",
      }}>
        <div>
          <div style={{ fontSize: "16px", fontWeight: "700" }}>🤖 המורה הפרטי שלך</div>
          <div style={{ fontSize: "12px", opacity: 0.8 }}>{unit.title}</div>
        </div>
        <button
          onClick={onToggle}
          style={{
            background: "rgba(255,255,255,0.2)",
            border: "none",
            color: "white",
            width: "32px",
            height: "32px",
            borderRadius: "50%",
            cursor: "pointer",
            fontSize: "16px",
          }}
        >
          ✕
        </button>
      </div>

      {/* Messages */}
      <div style={{
        flex: 1,
        overflowY: "auto",
        padding: "16px",
        display: "flex",
        flexDirection: "column",
        gap: "12px",
      }}>
        {messages.map((msg, i) => (
          <div
            key={i}
            style={{
              alignSelf: msg.role === "user" ? "flex-start" : "flex-end",
              maxWidth: "85%",
              padding: "12px 16px",
              borderRadius: msg.role === "user" ? "16px 16px 4px 16px" : "16px 16px 16px 4px",
              background: msg.role === "user"
                ? `${subject.color}15`
                : isFocus ? "#2d3748" : "#f1f5f9",
              color: isFocus ? "#e2e8f0" : "#1e293b",
              fontSize: "14px",
              lineHeight: "1.6",
              whiteSpace: "pre-wrap",
              border: msg.role === "user" ? `1px solid ${subject.color}30` : "none",
            }}
          >
            {msg.text}
          </div>
        ))}
        {isTyping && (
          <div style={{
            alignSelf: "flex-end",
            padding: "12px 16px",
            borderRadius: "16px 16px 16px 4px",
            background: isFocus ? "#2d3748" : "#f1f5f9",
            color: isFocus ? "#a0aec0" : "#94a3b8",
            fontSize: "14px",
          }}>
            ✍️ כותב...
          </div>
        )}
        <div ref={messagesEndRef} />
      </div>

      {/* Input */}
      <div style={{
        padding: "12px 16px",
        borderTop: isFocus ? "1px solid #4a5568" : "1px solid #e2e8f0",
        display: "flex",
        gap: "8px",
      }}>
        <input
          value={input}
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && handleSend()}

          style={{
            flex: 1,
            padding: "10px 16px",
            borderRadius: "50px",
            border: isFocus ? "1px solid #4a5568" : "1px solid #e2e8f0",

          }}

        <button
          onClick={handleSend}
          style={{
            width: "42px",
            height: "42px",
            borderRadius: "50%",
            background: subject.color,
            color: "white",
            border: "none",
            cursor: "pointer",
            fontSize: "18px",

function LessonView({ unit, subject, mode, onBack, onAddMistake, onNextUnit, hasNextUnit, currentUnitNum, totalUnits }) {
  const [activeTab, setActiveTab] = useState("learn");
  const [chatOpen, setChatOpen] = useState(false);
  const [scaffoldStep, setScaffoldStep] = useState(0);
  const [practiceMode, setPracticeMode] = useState(null);
  const [currentQuestion, setCurrentQuestion] = useState(0);
  const [userAnswer, setUserAnswer] = useState("");
  const [selectedOption, setSelectedOption] = useState(null);
  const [showAnswer, setShowAnswer] = useState(false);
  const [questionResults, setQuestionResults] = useState([]);
  const [expandedLearnSection, setExpandedLearnSection] = useState(0);
  // New UX state: linear topic-by-topic flow + terms drawer
  const [currentTopicPage, setCurrentTopicPage] = useState(0);
  const [termsDrawerOpen, setTermsDrawerOpen] = useState(false);
  const [expandedTermName, setExpandedTermName] = useState(null);

  // Get content data for this unit
  const contentData = CONTENT_DATA[subject.id]?.[unit.id] || {};
  const isRichContent = !!contentData.learn; // new expanded format has learn array
  const isFocus = mode === "focus";

  // Helper: render text with **inline bolded terms** that pop their definition inline when tapped
  const renderTextWithTerms = (text, keyPrefix = "t") => {
    const terms = contentData.terms || [];
    if (!terms.length || !text) return text;
    const sorted = [...terms].sort((a, b) => b.term.length - a.term.length);
    const termMap = {};
    sorted.forEach(t => { termMap[t.term] = t.def; });
    const escape = s => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const pattern = new RegExp("(" + sorted.map(t => escape(t.term)).join("|") + ")", "g");
    const parts = text.split(pattern);
    return parts.map((part, i) => {
      if (termMap[part]) {
        const isOpen = expandedTermName === keyPrefix + "-" + i + "-" + part;
        return (
          <React.Fragment key={keyPrefix + i}>
            <span
              onClick={() => setExpandedTermName(isOpen ? null : keyPrefix + "-" + i + "-" + part)}
              style={{
                fontWeight: "700",
                color: subject.color,
                cursor: "pointer",
                borderBottom: `1px dashed ${subject.color}`,
                padding: "0 2px",
              }}
              title="לחצ/י להגדרה"
            >
              {part}
            </span>
            {isOpen && (
              <span style={{
                display: "block",
                margin: "8px 0",
                padding: "10px 14px",
                background: isFocus ? "#2d3748" : `${subject.color}10`,
                borderRight: `3px solid ${subject.color}`,
                borderRadius: "8px",
                fontSize: "13px",
                fontWeight: "400",
                color: isFocus ? "#cbd5e0" : "#475569",
                lineHeight: "1.6",
              }}>
                <b style={{ color: subject.color }}>{part}:</b> {termMap[part]}
              </span>
            )}
          </React.Fragment>
        );
      }
      return <React.Fragment key={keyPrefix + i}>{part}</React.Fragment>;
    });
  };

  return (
    <div style={{ direction: "rtl" }}>
      {/* Back button */}
      <button
        onClick={onBack}
        style={{
          background: "none",
          border: "none",

      {/* Lesson Header */}
      <div style={{
        background: isFocus
          ? "linear-gradient(135deg, #1a202c, #2d3748)"
          : `linear-gradient(135deg, ${subject.color}10, ${subject.color}05)`,
        borderRadius: "20px",
        padding: "32px",
        marginBottom: "24px",
        border: isFocus ? "1px solid #4a5568" : `1px solid ${subject.color}20`,
      }}>
        <div style={{
          display: "flex",
          alignItems: "center",
          gap: "12px",
          marginBottom: "12px",
        }}>
          <span style={{
            background: `${subject.color}20`,
            color: subject.color,
            padding: "6px 14px",
            borderRadius: "8px",
            fontSize: "14px",
            fontWeight: "700",
          }}>
            יחידה {unit.id}
          </span>
          <span style={{
            color: isFocus ? "#718096" : "#94a3b8",
            fontSize: "13px",
          }}>

        </div>
        <h2 style={{

                {/* Show collected results summary if any */}
                {questionResults.length > 0 && (
                  <div style={{
                    marginTop: "20px", padding: "16px", borderRadius: "12px",
                    background: isFocus ? "#2d3748" : "#f8fafc",

            {/* Open Answer Practice */}
            {practiceMode === "open" && (() => {
              // Pull open questions from UNIT_QUESTION_BANK (priority), then contentData.q, then generated fallback
              const bankQs = (UNIT_QUESTION_BANK[subject.id]?.[unit.id] || [])
                .filter(q => q.type === "open")
                .map(q => ({ id: q.id, text: q.text, topic: q.topic, model_answer: q.model_answer, explanation: q.explanation }));
              const openFromContent = (contentData.q || []).filter(q => q.t === "open").map((q, i) => ({
                id: "cq-" + i, text: q.p, topic: "", model_answer: q.a,
              }));
              const generatedQs = unit.topics.map((topic, i) => ({
                id: "gen-" + i,
                text: i % 3 === 0
                  ? `הגדר/י מהו "${topic}" והסבר/י את חשיבותו בהקשר של ${unit.title}. בתשובתך: הגדרה, הסבר, ודוגמה.`
                  : i % 3 === 1
                  ? `השווה/י בין "${topic}" ל-"${unit.topics[(i + 1) % unit.topics.length]}". ציין/י דמיון אחד והבדל אחד, והבא/י דוגמה.`
                  : `כיצד "${topic}" משפיע על ${unit.title}? הסבר/י תוך התייחסות למושג אחד נוסף מהיחידה.`,
                topic: topic,
                model_answer: `${topic} הוא מושג מרכזי ב${unit.title}. ${unit.summary?.split(".")[0] || ""}.`,
              }));
              const questions = bankQs.length > 0 ? [...bankQs, ...openFromContent] : openFromContent.length > 0 ? openFromContent : generatedQs;
              const q = questions[currentQuestion % questions.length];

              // Smart keyword matching for open answers
              const checkOpenAnswer = (userAns, modelAns) => {
                if (!userAns || !modelAns) return { match: false, score: 0 };
                const normalize = (text) => text.replace(/["""״׳'`.,;:!?\-–—()\[\]{}\/\\]/g, " ").replace(/\s+/g, " ").trim();
                const userNorm = normalize(userAns);
                const modelNorm = normalize(modelAns);
                // Extract meaningful keywords (3+ chars) from model answer
                const stopWords = new Set(["של", "את", "על", "עם", "הוא", "היא", "הם", "הן", "זה", "זו", "אלה", "אלו", "או", "אם", "כי", "גם", "רק", "לא", "כל", "יותר", "מאוד", "עוד", "אין", "יש", "היה", "הייתה", "היו", "להיות", "שהוא", "שהיא", "אשר", "כאשר", "כמו", "בין", "לבין", "אך", "אבל", "אלא", "כדי", "מתוך", "בתוך", "לפי", "ביותר"]);
                const modelWords = modelNorm.split(" ").filter(w => w.length >= 3 && !stopWords.has(w));
                const uniqueKeywords = [...new Set(modelWords)];
                if (uniqueKeywords.length === 0) return { match: true, score: 100 };
                // Check how many keywords appear in user answer
                let matchCount = 0;
                for (const keyword of uniqueKeywords) {
                  if (userNorm.includes(keyword)) matchCount++;
                }
                const score = Math.round((matchCount / uniqueKeywords.length) * 100);
                // Lenient: 30%+ keyword match = correct
                return { match: score >= 30, score, matched: matchCount, total: uniqueKeywords.length };
              };

              return (
                <div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>

                    <span style={{ fontSize: "13px", color: isFocus ? "#718096" : "#94a3b8" }}>

                  </div>

                  <div style={{
                    background: isFocus ? "#2d3748" : `${subject.color}05`,
                    borderRadius: "14px", padding: "20px", marginBottom: "16px",

                        opacity: userAnswer.trim().length < 3 ? 0.5 : 1,

              const mcFromContent = (contentData.q || []).filter(q => q.t === "mc").map((q, i) => ({

              }));
              const generatedMcQs = unit.topics.map((topic, i) => {
                const correctAnswer = `${topic} — ${(unit.summary || "").split(".")[0]}`;
                const wrongAnswers = [
                  `${unit.topics[(i + 1) % unit.topics.length]} — מושג שונה לגמרי מ${topic}`,
                  `${topic} קשור רק ל${unit.topics[(i + 2) % unit.topics.length]} ולא ל${unit.title}`,

                const options = [correctAnswer, ...wrongAnswers].sort(() => Math.random() - 0.5);

              });
              const mcQuestions = bankMcQs.length > 0 ? [...bankMcQs, ...mcFromContent] : mcFromContent.length > 0 ? mcFromContent : generatedMcQs;

                  </div>

                  <div style={{
                    background: isFocus ? "#2d3748" : `${subject.color}05`,
                    borderRadius: "14px", padding: "20px", marginBottom: "16px",
                    border: `2px solid ${subject.color}30`,
                  }}>
                    <div style={{ fontSize: "12px", color: subject.color, fontWeight: "700", marginBottom: "8px" }}>
                      🔘 מבחן אמריקאי
                    </div>
                    <div style={{ fontSize: "15px", color: isFocus ? "#e2e8f0" : "#1e293b", lineHeight: "1.7" }}>
                      {q.text}
                    </div>
                  </div>

                  <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                    {q.options.map((option, oi) => {
                      const isSelected = selectedOption === oi;
                      const isCorrect = oi === q.correctIndex;
                      const showResult = showAnswer;
                      let borderColor = isFocus ? "#4a5568" : "#e2e8f0";
                      let bgColor = isFocus ? "#1a202c" : "#f8fafc";
                      if (showResult && isCorrect) { borderColor = "#16a34a"; bgColor = isFocus ? "#16a34a15" : "#f0fdf4"; }
                      else if (showResult && isSelected && !isCorrect) { borderColor = "#ef4444"; bgColor = isFocus ? "#ef444415" : "#fef2f2"; }
                      else if (isSelected) { borderColor = subject.color; bgColor = `${subject.color}10`; }
                      return (
                        <button key={oi} onClick={() => {

                          disabled={showAnswer}
                          style={{

                        {(q.model_answer || q.explanation) && (

                            marginTop: "10px", padding: "10px 14px", borderRadius: "8px",
                            background: isFocus ? "#2d3748" : "#f8fafc",

                      <button onClick={() => {
                        setCurrentQuestion(prev => prev + 1);
                        setShowAnswer(false);
                        setSelectedOption(null);
                      }}
                        style={{
                          marginTop: "12px", padding: "10px 24px", borderRadius: "8px",
                          background: subject.color, color: "white", border: "none",
                          cursor: "pointer", fontSize: "14px", fontWeight: "600",
                        }}>
                        שאלה הבאה →
                      </button>
                    </div>
                  )}
                </div>
              );
            })()}
          </div>
        )}

        {activeTab === "tips" && (
          <div>
            <h3 style={{
              color: isFocus ? "#e2e8f0" : "#1e293b",
              fontSize: "20px",
              marginTop: 0,
              marginBottom: "16px",
            }}>
              💡 טיפים לבגרות
            </h3>
            {(isRichContent && contentData.tips ? contentData.tips.map((t, i) => ({
              icon: ["💡","📝","⚡","🎯","⏰","✅"][i % 6], title: `טיפ ${i + 1}`, text: t
            })) : [
              { icon: "⏰", title: "ניהול זמן", text: `הקדישו כ-20 דקות לשאלות על ${unit.title}. התחילו מהשאלה שאתם הכי בטוחים בה.` },
              { icon: "📝", title: "מבנה תשובה", text: "תמיד פתחו עם הגדרה, המשיכו עם הסבר, וסיימו עם דוגמה. זה מבנה שמקנה ניקוד מלא." },
              { icon: "⚡", title: "מילות מפתח", text: `מילות מפתח שכדאי לזכור: ${unit.topics.join(", ")}. השתמשו במושגים המקצועיים!` },

}

// Subject-level AI Tutor
function SubjectAITutor({ subject, mode }) {
  const [messages, setMessages] = useState([
    { role: "ai", text: `שלום! אני המורה הפרטי שלך ב${subject.name} 🎓\n\nאני מכיר את כל ${subject.units.length} היחידות בשאלון ${subject.examNumber}.\nשאל/י אותי כל שאלה — על החומר, על הבגרות, טיפים, או כל דבר אחר!\n\nנושאים שאני יכול לעזור בהם:\n${subject.units.slice(0, 5).map(u => `• ${u.title}`).join("\n")}` },
  ]);
  const [input, setInput] = useState("");
  const [isTyping, setIsTyping] = useState(false);
  const messagesEndRef = useRef(null);
  const isFocus = mode === "focus";

  useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  const handleSend = () => {
    if (!input.trim()) return;
    const q = input.trim().toLowerCase();
    setMessages(prev => [...prev, { role: "user", text: input.trim() }]);
    setInput("");
    setIsTyping(true);
    setTimeout(() => {
      // Find relevant unit
      const match = subject.units.find(u =>
        u.topics.some(t => q.includes(t.toLowerCase?.()||t)) || q.includes(u.title.toLowerCase())
      );
      let response;
      if (match) {
        const mnem = CORRECTIVE_TEACHING.generateMnemonic(match.topics[0], match.topics);
        const mnemTip = mnem ? `\n\n🧠 עזר זיכרון: ${mnem.phrase}\n🎨 דמיין: ${mnem.visual}` : "";

      } else if (q.includes("טיפ") || q.includes("עצה") || q.includes("איך")) {
        response = `💡 טיפים ל${subject.name} (גישת הוראה מתקנת):\n\n🪜 שיטת הפיגום:\n1. קרא/י את השאלה פעמיים — סמן/י מילות מפתח\n2. זהה — איזה מושג? מאיזו יחידה?\n3. הגדר — כתוב/י הגדרה במשפט אחד\n4. דוגמה — תמיד דוגמה!\n5. קשר — איך זה מתחבר לנושא רחב?\n\n🧠 טיפ זיכרון: בנה/י ראשי תיבות לכל נושא\n⏱️ ניהול זמן: 20 דקות לשאלה פתוחה, 10 לסגורה\n✅ בדיקה: עברו על כל חלקי השאלה לפני שעוברים`;
      } else {
        response = `אני כאן בשבילך! 🌟\n\nב${subject.name} (שאלון ${subject.examNumber}) יש ${subject.units.length} יחידות.\n\n🪜 בוא/י נתחיל צעד אחר צעד:\n${subject.units.slice(0, 6).map(u => `• יחידה ${u.id}: ${u.title}`).join("\n")}\n\n💡 טיפ: שאל/י אותי על נושא ספציפי — אני אסביר בשפה פשוטה, עם דימויים ועזרי זיכרון!\n\nאפשר לשאול: "מה זה...?", "תסביר/י...", "תן/י דוגמה ל...", "איך ניגשים ל...?"`;
      }
      setMessages(prev => [...prev, { role: "ai", text: response }]);
      setIsTyping(false);
    }, 800 + Math.random() * 1200);
  };

  return (
    <div style={{
      background: isFocus ? "#1a202c" : "white",

    }}>
      <div style={{ padding: "16px 20px", background: `linear-gradient(135deg, ${subject.color}, ${subject.color}cc)`, color: "white" }}>

        <div style={{ fontSize: "13px", opacity: 0.8 }}>שאל/י כל שאלה על החומר</div>
      </div>
      <div style={{ height: "400px", overflowY: "auto", padding: "16px", display: "flex", flexDirection: "column", gap: "12px" }}>
        {messages.map((msg, i) => (
          <div key={i} style={{
            alignSelf: msg.role === "user" ? "flex-start" : "flex-end",
            maxWidth: "85%", padding: "12px 16px",
            borderRadius: msg.role === "user" ? "16px 16px 4px 16px" : "16px 16px 16px 4px",

            color: isFocus ? "#e2e8f0" : "#1e293b", fontSize: "14px", lineHeight: "1.7", whiteSpace: "pre-wrap",
            border: msg.role === "user" ? `1px solid ${subject.color}30` : "none",
          }}>{msg.text}</div>
        ))}
        {isTyping && <div style={{ alignSelf: "flex-end", padding: "12px 16px", borderRadius: "16px", background: isFocus ? "#2d3748" : "#f1f5f9", color: isFocus ? "#a0aec0" : "#94a3b8", fontSize: "14px" }}>✍️ חושב...</div>}
        <div ref={messagesEndRef} />
      </div>
      <div style={{ padding: "12px 16px", borderTop: isFocus ? "1px solid #4a5568" : "1px solid #e2e8f0", display: "flex", gap: "8px" }}>
        <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSend()}
          placeholder="שאל/י שאלה..."
          style={{ flex: 1, padding: "10px 16px", borderRadius: "50px", border: isFocus ? "1px solid #4a5568" : "1px solid #e2e8f0", background: isFocus ? "#2d3748" : "#f8fafc", color: isFocus ? "#e2e8f0" : "#1e293b", fontSize: "14px", outline: "none", direction: "rtl" }} />
        <button onClick={handleSend} style={{ width: "42px", height: "42px", borderRadius: "50%", background: subject.color, color: "white", border: "none", cursor: "pointer", fontSize: "18px", display: "flex", alignItems: "center", justifyContent: "center" }}>↑</button>
      </div>
    </div>
  );
}

// Exam Simulation with multi-topic selection
function ExamSimulation({ subject, mode }) {
  const [phase, setPhase] = useState("select"); // "select", "exam-pick", "started", "finished", "practice"
  const [selectedTopicIds, setSelectedTopicIds] = useState([]);
  const [selectedExam, setSelectedExam] = useState(null);
  const [timeLeft, setTimeLeft] = useState(90 * 60);
  const [currentQ, setCurrentQ] = useState(0);
  const [answers, setAnswers] = useState({});
  const [examResults, setExamResults] = useState([]);
  const [practiceQ, setPracticeQ] = useState(0);
  const [practiceAnswer, setPracticeAnswer] = useState("");
  const [showPracticeResult, setShowPracticeResult] = useState(false);
  const isFocus = mode === "focus";

  useEffect(() => {
    if (phase !== "started") return;
    const timer = setInterval(() => setTimeLeft(t => t > 0 ? t - 1 : 0), 1000);
    return () => clearInterval(timer);
  }, [phase]);

  const allUnitIds = subject.units.map(u => u.id);
  const allSelected = selectedTopicIds.length === allUnitIds.length;

  const toggleUnit = (uid) => {
    setSelectedTopicIds(prev => prev.includes(uid) ? prev.filter(id => id !== uid) : [...prev, uid]);
  };
  const toggleAll = () => {
    setSelectedTopicIds(allSelected ? [] : [...allUnitIds]);
  };

  const selectedUnits = subject.units.filter(u => selectedTopicIds.includes(u.id));

  // Build questions — use selected exam if available, otherwise build from content/generated
  const examQuestions = selectedExam ? selectedExam.questions.map(q => ({
    unit: subject.units.find(u => u.id === q.unit) || subject.units[0],
    topic: "", points: q.points,
    text: q.context ? q.context + "\n\n" + q.text : q.text,
    model_answer: q.model_answer,
    type: q.type, options: q.options, correctIndex: q.correctIndex,
  })) : null;

  const realExamQs = !examQuestions ? selectedUnits.flatMap(unit => {
    const cd = CONTENT_DATA[subject.id]?.[unit.id];
    if (!cd || !cd.q) return [];
    return cd.q.map(q => ({
      unit, topic: "", points: q.pts || 15,
      text: q.p, model_answer: q.a || (q.t === "mc" ? q.o[q.c] : ""),
      type: q.t, options: q.o, correctIndex: q.c,
    }));
  }) : [];

  const generatedQs = !examQuestions ? selectedUnits.flatMap(unit =>
    unit.topics.slice(0, 2).map(topic => ({
      unit: unit, topic, points: 15, type: "open",
      text: `(${unit.examUnit})\nהסבר/י את המושג "${topic}" בהקשר של ${unit.title}. בתשובתך:\nא. הגדר/י את המושג (5 נק')\nב. הבא/י דוגמה (5 נק')\nג. הסבר/י את חשיבותו (5 נק')`,
      model_answer: `${topic} הוא מושג מרכזי ב${unit.title}. ${unit.summary?.split(".")[0] || ""}.`,
    }))
  ) : [];

  const questions = examQuestions || (realExamQs.length >= 5 ? realExamQs : [...realExamQs, ...generatedQs]).slice(0, 15);

  // Grading function
  const gradeExam = () => {
    const results = questions.map((q, i) => {
      const userAns = answers[i] || "";
      if (q.type === "mc") {
        const selectedIdx = parseInt(userAns);
        const correct = selectedIdx === q.correctIndex;
        return { ...q, index: i, userAnswer: userAns, correct, earned: correct ? q.points : 0 };
      } else {
        // Open question — keyword matching
        if (!userAns.trim()) return { ...q, index: i, userAnswer: "", correct: false, earned: 0 };
        const normalize = (text) => (text || "").replace(/["""״׳'`.,;:!?\-–—()\[\]{}\/\\]/g, " ").replace(/\s+/g, " ").trim();
        const stopWords = new Set(["של", "את", "על", "עם", "הוא", "היא", "הם", "הן", "זה", "זו", "או", "אם", "כי", "גם", "רק", "לא", "כל", "יותר", "עוד", "אין", "יש", "אשר", "כמו", "בין", "אך", "אבל", "כדי"]);
        const modelWords = normalize(q.model_answer).split(" ").filter(w => w.length >= 3 && !stopWords.has(w));
        const unique = [...new Set(modelWords)];
        if (unique.length === 0) return { ...q, index: i, userAnswer: userAns, correct: true, earned: q.points };
        let matched = 0;
        const userNorm = normalize(userAns);
        for (const kw of unique) { if (userNorm.includes(kw)) matched++; }
        const score = matched / unique.length;
        const earned = Math.round(q.points * Math.min(1, score * 1.5)); // generous scaling
        return { ...q, index: i, userAnswer: userAns, correct: score >= 0.3, earned, matchPct: Math.round(score * 100) };
      }
    });
    setExamResults(results);
    setPhase("finished");
  };

  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;

  if (phase === "select") {

                      <div style={{

                        background: `${subject.color}15`, color: subject.color,

                        fontSize: "20px", flexShrink: 0,
                      }}>📝</div>
                      <div style={{ flex: 1 }}>

                          {exam.title}

        {/* Divider */}

          <button onClick={toggleAll} style={{

        <div style={{ display: "flex", flexDirection: "column", gap: "8px", marginBottom: "24px" }}>

                </div>
                <div style={{ fontSize: "12px", color: isFocus ? "#718096" : "#94a3b8", marginTop: "2px" }}>
                  {r.earned}/{r.points} נקודות {r.type === "open" && r.matchPct !== undefined ? `| דיוק: ${r.matchPct}%` : ""}
                </div>
              </div>
            </div>
          ))}
        </div>

        {/* Action Buttons */}
        <div style={{ display: "flex", flexDirection: "column", gap: "10px", alignItems: "center" }}>
          {mistakes.length > 0 && (
            <button onClick={() => { setPracticeQ(0); setPracticeAnswer(""); setShowPracticeResult(false); setPhase("practice"); }}
              style={{
                background: `linear-gradient(135deg, ${subject.color}, ${subject.color}cc)`,
                color: "white", border: "none", borderRadius: "50px",
                padding: "14px 40px", fontSize: "16px", fontWeight: "700", cursor: "pointer", width: "100%", maxWidth: "400px",
              }}>
              🔄 תרגול הטעויות ({mistakes.length} שאלות)
            </button>
          )}
          <button onClick={() => { setPhase("select"); setAnswers({}); setExamResults([]); setCurrentQ(0); setTimeLeft(90 * 60); }}
            style={{
              background: isFocus ? "#2d3748" : "#f1f5f9",
              color: isFocus ? "#a0aec0" : "#64748b", border: "none", borderRadius: "50px",
              padding: "12px 36px", fontSize: "14px", fontWeight: "600", cursor: "pointer", width: "100%", maxWidth: "400px",
            }}>
            ← בחינה חדשה
          </button>
        </div>
      </div>
    );
  }

  // ===== PRACTICE MISTAKES PHASE =====
  if (phase === "practice") {
    const mistakes = examResults.filter(r => !r.correct);
    if (mistakes.length === 0) {
      setPhase("finished");
      return null;
    }
    const mq = mistakes[practiceQ % mistakes.length];

    return (
      <div style={{ direction: "rtl" }}>
        <div style={{ textAlign: "center", marginBottom: "20px" }}>
          <h3 style={{ color: isFocus ? "#e2e8f0" : "#1e293b", fontSize: "20px", margin: "0 0 8px" }}>
            🔄 תרגול טעויות — {subject.name}
          </h3>
          <p style={{ color: isFocus ? "#718096" : "#94a3b8", fontSize: "14px", margin: 0 }}>
            שאלה {practiceQ + 1} מתוך {mistakes.length}
          </p>
        </div>

        <div style={{
          background: isFocus ? "#1a202c" : "white", borderRadius: "16px", padding: "24px",
          border: `2px solid ${subject.color}30`, marginBottom: "16px",
        }}>
          <div style={{ fontSize: "13px", color: subject.color, fontWeight: "600", marginBottom: "10px" }}>
            יחידה {mq.unit.id} — {mq.unit.title}
          </div>
          <div style={{ fontSize: "15px", color: isFocus ? "#e2e8f0" : "#1e293b", lineHeight: "1.8", whiteSpace: "pre-wrap" }}>
            {mq.text}
          </div>
        </div>

        {mq.type === "mc" ? (
          <div style={{ display: "flex", flexDirection: "column", gap: "8px", marginBottom: "16px" }}>
            {(mq.options || []).map((opt, oi) => {
              const isCorrect = oi === mq.correctIndex;
              const isSelected = showPracticeResult && practiceAnswer === String(oi);
              let bg = isFocus ? "#1a202c" : "#f8fafc";
              let border = isFocus ? "#4a5568" : "#e2e8f0";
              if (showPracticeResult && isCorrect) { bg = isFocus ? "#16a34a15" : "#f0fdf4"; border = "#16a34a"; }
              else if (showPracticeResult && isSelected && !isCorrect) { bg = isFocus ? "#ef444415" : "#fef2f2"; border = "#ef4444"; }
              return (
                <button key={oi} onClick={() => {
                  if (!showPracticeResult) {
                    setPracticeAnswer(String(oi));
                    setShowPracticeResult(true);
                  }
                }} disabled={showPracticeResult}
                  style={{
                    padding: "14px 18px", borderRadius: "12px", textAlign: "right",
                    border: `2px solid ${border}`, background: bg, cursor: showPracticeResult ? "default" : "pointer",
                    color: isFocus ? "#e2e8f0" : "#1e293b", fontSize: "14px", lineHeight: "1.5",
                  }}>
                  {String.fromCharCode(1488 + oi)}. {opt}
                  {showPracticeResult && isCorrect && " ✅"}
                  {showPracticeResult && isSelected && !isCorrect && " ❌"}
                </button>
              );
            })}
          </div>
        ) : (
          <>
            <textarea value={practiceAnswer} onChange={(e) => setPracticeAnswer(e.target.value)}
              placeholder="כתוב/י את תשובתך כאן..." disabled={showPracticeResult}
              style={{
                width: "100%", minHeight: "120px", padding: "16px", borderRadius: "12px",
                border: isFocus ? "1px solid #4a5568" : "1px solid #e2e8f0",
                background: isFocus ? "#1a202c" : "#f8fafc", color: isFocus ? "#e2e8f0" : "#1e293b",
                fontSize: "15px", lineHeight: "1.7", resize: "vertical", direction: "rtl", fontFamily: "inherit", boxSizing: "border-box",
              }} />
            {!showPracticeResult && (
              <button onClick={() => setShowPracticeResult(true)}
                disabled={practiceAnswer.trim().length < 3}
                style={{
                  marginTop: "10px", padding: "10px 24px", borderRadius: "10px",
                  background: subject.color, color: "white", border: "none", cursor: "pointer",
                  fontSize: "14px", fontWeight: "600", opacity: practiceAnswer.trim().length < 3 ? 0.5 : 1,
                }}>
                בדוק/י תשובה
              </button>
            )}
          </>
        )}

        {showPracticeResult && (
          <div style={{
            marginTop: "14px", padding: "16px", borderRadius: "12px",
            background: isFocus ? "#16a34a15" : "#f0fdf4", border: "1px solid #16a34a40",
          }}>
            <div style={{ fontSize: "14px", fontWeight: "700", color: "#16a34a", marginBottom: "6px" }}>📋 התשובה הנכונה:</div>
            <div style={{ fontSize: "14px", color: isFocus ? "#a0aec0" : "#475569", lineHeight: "1.7" }}>
              {mq.model_answer}
            </div>
          </div>
        )}

        {showPracticeResult && (
          <div style={{ display: "flex", gap: "10px", marginTop: "16px" }}>
            {practiceQ < mistakes.length - 1 ? (
              <button onClick={() => { setPracticeQ(q => q + 1); setPracticeAnswer(""); setShowPracticeResult(false); }}
                style={{ padding: "10px 24px", borderRadius: "10px", background: subject.color, color: "white", border: "none", cursor: "pointer", fontSize: "14px", fontWeight: "600" }}>
                שאלה הבאה →
              </button>
            ) : (
              <button onClick={() => setPhase("finished")}
                style={{ padding: "10px 24px", borderRadius: "10px", background: subject.color, color: "white", border: "none", cursor: "pointer", fontSize: "14px", fontWeight: "600" }}>
                חזרה לסיכום ✓
              </button>
            )}
          </div>
        )}
      </div>
    );
  }

  // ===== EXAM STARTED PHASE =====
  return (
    <div style={{ direction: "rtl" }}>
      {/* Timer Bar */}
      <div style={{
        background: isFocus ? "#1a202c" : "white", borderRadius: "14px", padding: "14px 20px",
        border: isFocus ? "1px solid #4a5568" : "1px solid #e2e8f0", marginBottom: "20px",
        display: "flex", justifyContent: "space-between", alignItems: "center",
      }}>
        <span style={{ fontSize: "14px", color: isFocus ? "#a0aec0" : "#64748b" }}>שאלה {currentQ + 1} מתוך {questions.length}</span>
        <span style={{ fontSize: "22px", fontWeight: "800", color: timeLeft < 600 ? "#ef4444" : subject.color, fontVariantNumeric: "tabular-nums" }}>
          {String(mins).padStart(2,"0")}:{String(secs).padStart(2,"0")}
        </span>
        <span style={{ fontSize: "13px", color: isFocus ? "#718096" : "#94a3b8" }}>{questions[currentQ]?.points} נק'</span>
      </div>

      {/* Question Navigator dots */}
      <div style={{ display: "flex", gap: "4px", justifyContent: "center", marginBottom: "16px", flexWrap: "wrap" }}>
        {questions.map((_, i) => (
          <button key={i} onClick={() => setCurrentQ(i)}
            style={{
              width: "28px", height: "28px", borderRadius: "50%", border: "none", cursor: "pointer",
              fontSize: "11px", fontWeight: "700",
              background: i === currentQ ? subject.color : answers[i] ? `${subject.color}30` : (isFocus ? "#2d3748" : "#f1f5f9"),
              color: i === currentQ ? "white" : answers[i] ? subject.color : (isFocus ? "#718096" : "#94a3b8"),
            }}>
            {i + 1}
          </button>
        ))}
      </div>

      {/* Question */}
      <div style={{
        background: isFocus ? "#1a202c" : "white", borderRadius: "16px", padding: "28px",
        border: isFocus ? "1px solid #4a5568" : "1px solid #e2e8f0", marginBottom: "16px",
      }}>
        <div style={{ fontSize: "13px", color: subject.color, fontWeight: "600", marginBottom: "12px" }}>
          יחידה {questions[currentQ]?.unit.id} — {questions[currentQ]?.unit.title}
        </div>
        <div style={{ fontSize: "16px", color: isFocus ? "#e2e8f0" : "#1e293b", lineHeight: "1.8", whiteSpace: "pre-wrap" }}>
          {questions[currentQ]?.text}
        </div>
      </div>

      {/* Answer Area — MC or Open */}
      {questions[currentQ]?.type === "mc" ? (
        <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
          {(questions[currentQ].options || []).map((opt, oi) => (
            <button key={oi} onClick={() => setAnswers(prev => ({ ...prev, [currentQ]: String(oi) }))}
              style={{
                padding: "14px 18px", borderRadius: "12px", textAlign: "right",
                border: `2px solid ${answers[currentQ] === String(oi) ? subject.color : (isFocus ? "#4a5568" : "#e2e8f0")}`,
                background: answers[currentQ] === String(oi) ? `${subject.color}15` : (isFocus ? "#1a202c" : "#f8fafc"),
                cursor: "pointer", color: isFocus ? "#e2e8f0" : "#1e293b", fontSize: "14px", lineHeight: "1.5",
              }}>
              {String.fromCharCode(1488 + oi)}. {opt}
            </button>
          ))}
        </div>
      ) : (
        <textarea
          value={answers[currentQ] || ""}
          onChange={(e) => setAnswers(prev => ({ ...prev, [currentQ]: e.target.value }))}
          placeholder="כתוב/י את תשובתך כאן..."
          style={{
            width: "100%", minHeight: "180px", borderRadius: "14px", padding: "16px",
            border: isFocus ? "1px solid #4a5568" : "1px solid #e2e8f0",
            background: isFocus ? "#2d3748" : "#f8fafc", color: isFocus ? "#e2e8f0" : "#1e293b",
            fontSize: "15px", lineHeight: "1.8", outline: "none", resize: "vertical", direction: "rtl",
            boxSizing: "border-box",
          }}
        />
      )}

      {/* Navigation */}
      <div style={{ display: "flex", justifyContent: "space-between", marginTop: "16px" }}>
        <button onClick={() => setCurrentQ(q => Math.max(0, q-1))} disabled={currentQ === 0}
          style={{ padding: "10px 24px", borderRadius: "10px", border: "none", cursor: currentQ === 0 ? "default" : "pointer", background: isFocus ? "#2d3748" : "#f1f5f9", color: isFocus ? "#a0aec0" : "#64748b", fontSize: "14px", opacity: currentQ === 0 ? 0.4 : 1 }}>
          → הקודמת
        </button>
        {currentQ === questions.length - 1 ? (
          <button onClick={gradeExam}
            style={{ padding: "10px 28px", borderRadius: "10px", border: "none", cursor: "pointer", background: "#16a34a", color: "white", fontSize: "15px", fontWeight: "700" }}>
            סיום ובדיקה ✓
          </button>
        ) : (
          <button onClick={() => setCurrentQ(q => q + 1)}
            style={{ padding: "10px 24px", borderRadius: "10px", border: "none", cursor: "pointer", background: subject.color, color: "white", fontSize: "14px", fontWeight: "600" }}>
            הבאה ←
          </button>
        )}
      </div>

      {/* Answered count */}
      <div style={{ textAlign: "center", marginTop: "12px", fontSize: "13px", color: isFocus ? "#718096" : "#94a3b8" }}>
        ענית על {Object.keys(answers).filter(k => (answers[k] || "").trim().length > 0).length} מתוך {questions.length} שאלות
      </div>
    </div>
  );
}

// Flashcards
function Flashcards({ subject, mode }) {
  const isFocus = mode === "focus";
  const cards = subject.units.flatMap(unit =>
    unit.topics.map(topic => ({ front: topic, back: `${unit.summary.split(".")[0]}.`, unit: unit.id, unitTitle: unit.title }))
  );
  const [currentCard, setCurrentCard] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [known, setKnown] = useState(0);

  const card = cards[currentCard];
  const nextCard = (isKnown) => {
    if (isKnown) setKnown(k => k + 1);
    setFlipped(false);
    setCurrentCard(c => (c + 1) % cards.length);
  };

  return (
    <div style={{ textAlign: "center", direction: "rtl" }}>
      <h3 style={{ color: isFocus ? "#e2e8f0" : "#1e293b", fontSize: "22px", marginTop: 0, marginBottom: "8px" }}>
        🃏 כרטיסיות זיכרון — {subject.name}
      </h3>
      <p style={{ color: isFocus ? "#718096" : "#94a3b8", fontSize: "14px", marginBottom: "24px" }}>
        {currentCard + 1} מתוך {cards.length} | ידעת: {known}
      </p>
      {/* Progress */}
      <div style={{ background: isFocus ? "#2d3748" : "#f1f5f9", borderRadius: "8px", height: "6px", maxWidth: "400px", margin: "0 auto 24px", overflow: "hidden" }}>
        <div style={{ width: `${((currentCard + 1) / cards.length) * 100}%`, height: "100%", background: subject.color, borderRadius: "8px", transition: "width 0.3s" }} />
      </div>
      {/* Card */}
      <div onClick={() => setFlipped(!flipped)} style={{
        background: flipped
          ? isFocus ? "#2d3748" : `${subject.color}08`
          : isFocus ? "#1a202c" : "white",
        border: flipped ? `2px solid ${subject.color}` : isFocus ? "2px solid #4a5568" : "2px solid #e2e8f0",
        borderRadius: "20px", padding: "48px 32px", maxWidth: "500px", margin: "0 auto 24px",
        cursor: "pointer", minHeight: "200px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
        transition: "all 0.3s ease",
      }}>
        {!flipped ? (
          <>
            <div style={{ fontSize: "13px", color: isFocus ? "#718096" : "#94a3b8", marginBottom: "16px" }}>{card.unit} — {card.unitTitle}</div>
            <div style={{ fontSize: "24px", fontWeight: "800", color: isFocus ? "#e2e8f0" : "#1e293b" }}>{card.front}</div>
            <div style={{ fontSize: "13px", color: isFocus ? "#4a5568" : "#cbd5e1", marginTop: "24px" }}>לחצ/י להפוך</div>
          </>
        ) : (
          <>
            <div style={{ fontSize: "13px", color: subject.color, fontWeight: "600", marginBottom: "16px" }}>תשובה:</div>
            <div style={{ fontSize: "16px", color: isFocus ? "#cbd5e0" : "#475569", lineHeight: "1.7" }}>{card.back}</div>
          </>
        )}
      </div>
      {/* Buttons */}
      {flipped && (
        <div style={{ display: "flex", justifyContent: "center", gap: "12px" }}>
          <button onClick={() => nextCard(false)} style={{
            padding: "12px 32px", borderRadius: "12px", border: "none", cursor: "pointer",
            background: "#ef444415", fontSize: "15px", fontWeight: "600",
          }}>😕 לא ידעתי</button>
          <button onClick={() => nextCard(true)} style={{
            padding: "12px 32px", borderRadius: "12px", border: "none", cursor: "pointer",
            background: "#16a34a15", fontSize: "15px", fontWeight: "600",
          }}>😊 ידעתי!</button>
        </div>
      )}
    </div>
  );
}

// Study Planner Component
function StudyPlanner({ subject, mode }) {
  const [examDate, setExamDate] = useState("");
  const [selectedUnits, setSelectedUnits] = useState(subject.units.map(u => u.id));
  const [practiceExams, setPracticeExams] = useState(3);
  const [dailyHours, setDailyHours] = useState(2);
  const [showPlan, setShowPlan] = useState(false);
  const isFocus = mode === "focus";

  // Generate study schedule
  const generatePlan = () => {
    if (!examDate) return [];
    const today = new Date();
    const exam = new Date(examDate);
    const daysLeft = Math.max(1, Math.ceil((exam - today) / (1000 * 60 * 60 * 24)));
    const units = subject.units.filter(u => selectedUnits.includes(u.id));
    const totalUnits = units.length;
    const studyDays = Math.max(1, daysLeft - practiceExams);
    const unitsPerDay = Math.ceil(totalUnits / studyDays);

    const plan = [];
    let unitIndex = 0;
    for (let d = 0; d < daysLeft; d++) {
      const date = new Date(today);
      date.setDate(date.getDate() + d + 1);
      const dateStr = date.toLocaleDateString("he-IL", { weekday: "short", day: "numeric", month: "numeric" });

      if (d >= studyDays) {
        plan.push({ day: d + 1, date: dateStr, type: "exam", title: `מבחן תרגול #${d - studyDays + 1}`, desc: `פתור/י מבחן בגרות שלם בתנאי בחינה (${dailyHours} שעות)` });
      } else {
        const dayUnits = units.slice(unitIndex, unitIndex + unitsPerDay);
        unitIndex += unitsPerDay;
        if (dayUnits.length > 0) {
          plan.push({ day: d + 1, date: dateStr, type: "study", title: `למידה: ${dayUnits.map(u => `יח' ${u.id}`).join(", ")}`, desc: dayUnits.map(u => u.title).join(" + ") });
        }
      }
    }
    return plan;
  };

  const recommendedHours = subject.units.length > 10 ? 3 : subject.units.length > 6 ? 2.5 : 2;

  return (
    <div>
      <h3 style={{ color: isFocus ? "#e2e8f0" : "#1e293b", fontSize: "22px", marginTop: 0, marginBottom: "8px" }}>
        📅 תכנון למידה חכם — {subject.name}
      </h3>
      <p style={{ color: isFocus ? "#718096" : "#94a3b8", fontSize: "14px", marginBottom: "24px" }}>
        הכנס/י את תאריך הבחינה ונבנה לך לוח זמנים יומי מותאם אישית
      </p>

      <div style={{
        background: isFocus ? "#1a202c" : "white",
        borderRadius: "16px", padding: "24px",
        border: isFocus ? "1px solid #4a5568" : "1px solid #e2e8f0",
        marginBottom: "20px",
      }}>
        {/* Exam Date */}
        <div style={{ marginBottom: "20px" }}>
          <label style={{ display: "block", fontSize: "14px", fontWeight: "700", color: isFocus ? "#e2e8f0" : "#1e293b", marginBottom: "8px" }}>
            📆 תאריך הבחינה:
          </label>
          <input type="date" value={examDate} onChange={(e) => setExamDate(e.target.value)}
            style={{
              padding: "10px 14px", borderRadius: "10px", border: isFocus ? "1px solid #4a5568" : "1px solid #e2e8f0",
              background: isFocus ? "#2d3748" : "#f8fafc", color: isFocus ? "#e2e8f0" : "#1e293b",
              fontSize: "15px", width: "200px",
            }} />
        </div>

        {/* Daily Hours */}
        <div style={{ marginBottom: "20px" }}>
          <label style={{ display: "block", fontSize: "14px", fontWeight: "700", color: isFocus ? "#e2e8f0" : "#1e293b", marginBottom: "8px" }}>
            ⏰ שעות למידה ביום:
          </label>
          <div style={{ display: "flex", gap: "8px", alignItems: "center", flexWrap: "wrap" }}>
            {[1, 1.5, 2, 2.5, 3, 4].map(h => (
              <button key={h} onClick={() => setDailyHours(h)}
                style={{
                  padding: "8px 16px", borderRadius: "8px",
                  background: dailyHours === h ? "#0d9488" : (isFocus ? "#2d3748" : "#f1f5f9"),
                  color: dailyHours === h ? "white" : (isFocus ? "#e2e8f0" : "#1e293b"),
                  border: dailyHours === h ? "none" : (isFocus ? "1px solid #4a5568" : "1px solid #e2e8f0"),
                  cursor: "pointer", fontSize: "14px", fontWeight: "600",
                }}>
                {h} שעות
              </button>
            ))}
          </div>
          <div style={{ fontSize: "12px", marginTop: "6px" }}>
            💡 המלצת המערכת: {recommendedHours} שעות ביום ל{subject.name}
          </div>
        </div>

        {/* Practice Exams */}
        <div style={{ marginBottom: "20px" }}>
          <label style={{ display: "block", fontSize: "14px", fontWeight: "700", color: isFocus ? "#e2e8f0" : "#1e293b", marginBottom: "8px" }}>
            📝 כמה מבחני תרגול לפני הבחינה?
          </label>
          <div style={{ display: "flex", gap: "8px" }}>
            {[1, 2, 3, 4, 5].map(n => (
              <button key={n} onClick={() => setPracticeExams(n)}
                style={{
                  padding: "8px 16px", borderRadius: "8px",
                  background: practiceExams === n ? "#0d9488" : (isFocus ? "#2d3748" : "#f1f5f9"),
                  color: practiceExams === n ? "white" : (isFocus ? "#e2e8f0" : "#1e293b"),
                  border: practiceExams === n ? "none" : (isFocus ? "1px solid #4a5568" : "1px solid #e2e8f0"),
                  cursor: "pointer", fontSize: "14px", fontWeight: "600",
                }}>
                {n}
              </button>
            ))}
          </div>
        </div>

        {/* Units Selection */}
        <div style={{ marginBottom: "20px" }}>
          <label style={{ display: "block", fontSize: "14px", fontWeight: "700", color: isFocus ? "#e2e8f0" : "#1e293b", marginBottom: "8px" }}>
            📖 יחידות ללמידה:
          </label>
          <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
            {subject.units.map(u => (
              <button key={u.id} onClick={() => {
                setSelectedUnits(prev => prev.includes(u.id) ? prev.filter(id => id !== u.id) : [...prev, u.id]);
              }}
                style={{
                  padding: "6px 12px", borderRadius: "8px", fontSize: "12px",
                  background: selectedUnits.includes(u.id) ? `${subject.color}20` : (isFocus ? "#2d3748" : "#f1f5f9"),
                  color: selectedUnits.includes(u.id) ? subject.color : (isFocus ? "#718096" : "#94a3b8"),
                  border: selectedUnits.includes(u.id) ? `1px solid ${subject.color}` : (isFocus ? "1px solid #4a5568" : "1px solid #e2e8f0"),
                  cursor: "pointer", fontWeight: selectedUnits.includes(u.id) ? "600" : "400",
                }}>
                יח' {u.id}
              </button>
            ))}
          </div>
        </div>

        <button onClick={() => setShowPlan(true)} disabled={!examDate}
          style={{
            padding: "12px 32px", borderRadius: "12px",

              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

        )}

        {/* Footer Links */}
        <div style={{ marginTop: "16px", display: "flex", justifyContent: "center", gap: "16px" }}>

        </div>
      </div>
    </div>
  );
}

                      }}>
                        <div style={{ fontSize: "12px", fontWeight: "600", marginBottom: "6px" }}>
                          ❌ טעות ב{mistake.unit} — {mistake.topic}
                        </div>
                        <div style={{ fontSize: "14px", color: isFocus ? "#e2e8f0" : "#1e293b", lineHeight: "1.6", marginBottom: "8px" }}>
                          {mistake.question}
                        </div>
                        <div style={{ fontSize: "13px", color: isFocus ? "#718096" : "#94a3b8" }}>
                          תשובתך: {mistake.userAnswer.substring(0, 100)}{mistake.userAnswer.length > 100 ? "..." : ""}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* ====== VIEW: Smart Study Planner ====== */}
            {activeView === "study-planner" && (
              <StudyPlanner subject={selectedSubject} mode={mode} />
            )}

            {/* ====== Floating AI Tutor Button ====== */}
            {activeView !== "ai-tutor" && (
              <button
                onClick={() => setActiveView("ai-tutor")}
                title="מורה פרטי AI"
                style={{
                  position: "fixed", bottom: "24px", left: "24px",
                  width: "60px", height: "60px", borderRadius: "50%",
                  background: `linear-gradient(135deg, ${selectedSubject.color}, ${selectedSubject.color}cc)`,
                  color: "white", border: "none", cursor: "pointer",
                  fontSize: "28px", boxShadow: `0 6px 24px ${selectedSubject.color}40`,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  zIndex: 50, transition: "transform 0.2s",
                }}
                onMouseEnter={e => e.currentTarget.style.transform = "scale(1.1)"}
                onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}
              >
                🤖
              </button>
            )}
          </div>
        )}

        {/* Lesson */}
        {selectedSubject && selectedUnit && (() => {
          const queueUnits = selectedSubject.units.filter(u => learningQueue.includes(u.id));
          const currentIdx = queueUnits.findIndex(u => u.id === selectedUnit.id);
          const isInQueue = currentIdx >= 0;
          const hasNext = isInQueue && currentIdx < queueUnits.length - 1;
          const goNext = () => {
            if (hasNext) {
              const nextUnit = queueUnits[currentIdx + 1];
              setSelectedUnit(nextUnit);
              setLearningIndex(currentIdx + 1);
            }
          };
          return (
            <LessonView
              unit={selectedUnit}
              subject={selectedSubject}
              mode={mode}
              onBack={() => { setSelectedUnit(null); }}
              onAddMistake={(result) => student.addMistake(selectedSubject.id, result)}
              onNextUnit={goNext}
              hasNextUnit={hasNext}
              currentUnitNum={isInQueue ? currentIdx + 1 : 0}
              totalUnits={isInQueue ? queueUnits.length : 0}
            />
          );
        })()}
      </main>

      {/* Footer */}
      <footer style={{
        textAlign: "center",
        padding: "24px 32px 32px",
        color: isFocus ? "#4a5568" : "#cbd5e1",
        fontSize: "13px",
      }}>
        <div>BagrutAI © 2026 — הדרך החכמה להצליח בבגרות</div>
        <div style={{ marginTop: "8px", fontSize: "12px" }}>
          <span>כל הזכויות שמורות</span>
        </div>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<BagrutAI />);
</script>
</body>
</html>
